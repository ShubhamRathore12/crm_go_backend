services:
  - type: web
    name: crm-backend
    env: docker
    region: oregon
    plan: starter
    branch: main
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY_SECS
        value: 86400
      - key: API_BASE_URL
        sync: false
